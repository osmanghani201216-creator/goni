<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Al-Quran & Tafsir - Redirecting...</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script checks if a redirect is present in the query string and converts it back into the correct url and adds it to the browser's history using window.history.replaceState.
    
    // We can also simplify this to direct everything back to under index.html with the right hash
    var pathSegmentsToKeep = 1;

    var l = window.location;
    var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash;

    l.replace(redirectUrl);
  </script>
</head>
<body>
  <p>Redirecting to homepage...</p>
</body>
</html>
